
<h2 class="sr-only">Homeownership Fair Raffle Entry Form — submits to Zapier webhook</h2>
<div style="max-width: 560px; margin: 0 auto; padding: 1.5rem 0;">

  <div style="text-align: center; margin-bottom: 2rem;">
    <div style="font-size: 13px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;">Homeownership & Financial Literacy Fair</div>
    <div style="font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px;">Enter to Win</div>
    <div style="font-size: 14px; color: var(--color-text-secondary);">Fill out the form below to enter our raffle</div>
  </div>

  <div id="form-card" style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem;">

    <div style="font-size: 12px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1rem;">Contact info</div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
      <div>
        <label style="display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">First name</label>
        <input id="first_name" type="text" placeholder="Jane" style="width: 100%; box-sizing: border-box;" />
      </div>
      <div>
        <label style="display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Last name</label>
        <input id="last_name" type="text" placeholder="Smith" style="width: 100%; box-sizing: border-box;" />
      </div>
    </div>

    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Email address</label>
      <input id="email" type="email" placeholder="jane@example.com" style="width: 100%; box-sizing: border-box;" />
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Phone number</label>
      <input id="phone" type="tel" placeholder="(555) 000-0000" style="width: 100%; box-sizing: border-box;" />
    </div>

    <div style="border-top: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.25rem;"></div>
    <div style="font-size: 12px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1rem;">Financing interest</div>

    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-size: 14px; color: var(--color-text-primary); margin-bottom: 10px;">Are you interested in financing?</label>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing" value="Yes" onchange="toggleDetail(true)" style="width:16px;height:16px;flex-shrink:0;" /> Yes
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing" value="Maybe" onchange="toggleDetail(true)" style="width:16px;height:16px;flex-shrink:0;" /> Maybe / Not sure
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing" value="No" onchange="toggleDetail(false)" style="width:16px;height:16px;flex-shrink:0;" /> No
        </label>
      </div>
    </div>

    <div id="financing-detail" style="display: none; margin-bottom: 1rem;">
      <label style="display: block; font-size: 14px; color: var(--color-text-primary); margin-bottom: 10px;">What type of financing are you looking for?</label>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing_type" value="Purchase" style="width:16px;height:16px;flex-shrink:0;" /> Purchase
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing_type" value="Refinance" style="width:16px;height:16px;flex-shrink:0;" /> Refinance
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing_type" value="Both" style="width:16px;height:16px;flex-shrink:0;" /> Both
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px;">
          <input type="radio" name="financing_type" value="Not sure yet" style="width:16px;height:16px;flex-shrink:0;" /> Not sure yet
        </label>
      </div>
    </div>

    <div style="border-top: 0.5px solid var(--color-border-tertiary); margin: 1.25rem 0;"></div>
    <div style="font-size: 12px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1rem;">Consent</div>

    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem;">
      <input id="consent" type="checkbox" style="width:16px;height:16px;flex-shrink:0;margin-top:1px;" />
      I agree to be contacted after the event with information about homeownership and financing options.
    </label>

    <div id="error-msg" style="display:none; font-size:13px; color: var(--color-text-danger); margin-bottom: 12px; padding: 10px 12px; border: 0.5px solid var(--color-border-danger); border-radius: var(--border-radius-md); background: var(--color-background-danger);"></div>

    <button id="submit-btn" onclick="handleSubmit()" style="width: 100%; padding: 12px; font-size: 15px; font-weight: 500; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); cursor: pointer;">
      Submit entry
    </button>
  </div>

  <div id="success-msg" style="display:none; text-align:center; margin-top: 1.5rem; padding: 1.5rem; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg);">
    <div style="font-size: 18px; font-weight: 500; margin-bottom: 4px;">You're entered!</div>
    <div style="font-size: 14px; color: var(--color-text-secondary);">Good luck in the raffle. We'll be in touch soon.</div>
  </div>

</div>

<script>
const ZAPIER_HOOK = 'https://hooks.zapier.com/hooks/catch/651288/uj0865d/';

function toggleDetail(show) {
  document.getElementById('financing-detail').style.display = show ? 'block' : 'none';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError() {
  const el = document.getElementById('error-msg');
  el.style.display = 'none';
  el.textContent = '';
}

async function handleSubmit() {
  clearError();

  const first_name = document.getElementById('first_name').value.trim();
  const last_name = document.getElementById('last_name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const financing = document.querySelector('input[name="financing"]:checked')?.value || '';
  const financing_type = document.querySelector('input[name="financing_type"]:checked')?.value || '';
  const consent = document.getElementById('consent').checked;

  if (!first_name || !last_name) { showError('Please enter your first and last name.'); return; }
  if (!email) { showError('Please enter your email address.'); return; }
  if (!consent) { showError('Please check the consent box to continue.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Submitting…';
  btn.disabled = true;

  const payload = {
    first_name,
    last_name,
    email,
    phone,
    financing_interest: financing,
    financing_type,
    group: 'Homeownership Fair 5.2.26',
    ok_to_email: consent ? '1' : '0',
    source: 'Homeownership Fair 5.2.26'
  };

  try {
    await fetch(ZAPIER_HOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      mode: 'no-cors'
    });
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  } catch (err) {
    btn.textContent = 'Submit entry';
    btn.disabled = false;
    showError('Something went wrong. Please try again.');
  }
}
</script>
